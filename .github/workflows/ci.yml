name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: worldarchitect
          POSTGRES_PASSWORD: worldarchitect
          POSTGRES_DB: worldarchitect
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U worldarchitect -d worldarchitect"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Run Postgres and RLS integration tests
        run: npm run test:postgres -w server
        env:
          CI: 'true'
          DRIFT_TEST_DATABASE_URL: postgres://worldarchitect:worldarchitect@localhost:5432/worldarchitect
      - name: Run server tests
        run: npm test -w server
        env:
          DRIFT_TEST_DATABASE_URL: postgres://worldarchitect:worldarchitect@localhost:5432/worldarchitect
      - name: Run client tests
        run: npm test -w client

  image:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: worldarchitect:${{ github.sha }}
